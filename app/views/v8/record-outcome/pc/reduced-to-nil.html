{% extends "layouts/main_post_2026.html" %}
{% set globalNavSection = 'My tasks' %}

{% block pageTitle %}
Cancel alerts
{% endblock %}

{% block content %}
<main class="govuk-main-wrapper">
  <div class="govuk-grid-row">
    <div class="govuk-grid-column-two-thirds">


      <section class="dwp-quick-reference" aria-label="Case information">
        <dl class="dwp-quick-reference__block">
          <dt class="dwp-quick-reference__label govuk-visually-hidden">Name:</dt>
          <dd class="dwp-quick-reference__primary">Bob Banana</dd>
          <dt class="dwp-quick-reference__label dwp-quick-reference__label--primary govuk-visually-hidden">National
            Insurance number:</dt>
          <dd class="dwp-quick-reference__secondary">QQ 12 34 56 A</dd>
        </dl>
      </section>



      <form method="post">
        <div class="govuk-form-group">
          <fieldset class="govuk-fieldset">
            <legend class="govuk-body">
              <span class="govuk-caption-l">Record an outcome</span>
              <h2 class="govuk-fieldset__heading-l">
                Has the reduction resulted in a nil award?
              </h2>
            </legend>

            <div class="govuk-radios govuk-radios--inline" data-module="govuk-radios">
              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="reducedToNil" name="reducedToNil" type="radio" value="Yes">
                <label class="govuk-label govuk-radios__label" for="reducedToNil">
                  Yes
                </label>
              </div>


              <div class="govuk-radios__item">
                <input class="govuk-radios__input" id="reducedToNil-2" name="reducedToNil" type="radio" value="No">
                <label class="govuk-label govuk-radios__label" for="reducedToNil-2">
                  No
                </label>
              </div>
            </div>
          </fieldset>
        </div>
        <div class="form-group">
          <button type="submit" class="govuk-button">Continue</button>
        </div>
      </form>

    </div>
  </div>
</main>


{% endblock %}
